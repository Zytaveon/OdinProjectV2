<!DOCTYPE html>
<html lang = "en">

    <head>
        <meta charset = "UTF-8">
        <title>Sign-Up Form</title>
        <link rel = "stylesheet" href = "styles.css">
        <script src = "script.js" defer></script>
    </head>

    <body>
        <div class = "Container">
            <div class = "ImageContainer">
                <div class = "OdinLogoStrip">
                    <img src = "assets/OdinLogo.png" id = "OdinLogo">
                    <h1 class = "OdinLogoText">ODIN</h1>
                </div>
                <img src = "assets/SignUpFormPic.jpg" id = "OdinPic">
            </div>
            <div class = "FormContainer">
                <div class = "Section_Top">
                    <p>
                    This is not a real online service! You know you need something
                    like this in your life to help you realize your deepest dreams.
                    Sign up <em>now</em> to get started.
                    </p>
                    <p>
                    You <em>know</em> you want to.
                    </p>
                </div>
                <div class = "Section_Middle">
                    <div class = "form FirstName">
                        <label for = "firstName">First Name: </label>
                        <input type = "text" id = "firstName" name = "firstName">
                    </div>
                    <div class = "form LastName">
                        <label for = "lastName">Last Name: </label>
                        <input type = "text" id = "lastName" name = "lastName">
                    </div>
                    <div class = "form Email">
                        <label for = "email">Email: </label>
                        <input type = "email" id = "email" name = "email">
                    </div>
                    <div class = "form PhoneNumber">
                        <label for = "phoneNumber">Phone Number: </label>
                        <input type = "text" id = "phoneNumber" name = "phoneNumber">
                    </div>
                    <div class = "form Password">
                        <label for = "password">Password: </label>
                        <input type = "password" id = "password" name = "password">
                    </div>
                    <div class = "form ConfirmPassword">
                        <label for = "confirmPassword">Confirm Password: </label>
                        <input type = "password" id = "confirmPassword" name = "confirmPassword">
                    </div>
                </div>
                <div class = "Section_Bottom">
                    <button action = "submit" class = "submit_button">Create Account</button>
                    <p>Already have an account? <a>Log in</a></p>
                </div>
            </div>
        </div>
    </body>

</html>
