<!DOCTYPE html>
<html lang = "en">
	<head>
		<meta charset = "UTF-8">
		<title>Calculator</title>
		<link rel = "stylesheet" href = "styles.css">
		<script src = "script.js" defer></script>
	</head>
	<body>
		<div class = "Calculator_Container">
			<div class = "Display_Container">
				<!-- DEFAULT TEXT, good for testing -->
				ERROR
			</div>
			<div class = "Button_Container">
				<div class = "Row_Container">
					<button class = "Utility_Button" id = "Back_Button">Back</button>
					<button class = "Utility_Button" id = "Clear_Button">Clear</button>
					<button class = "Utility_Button" id = "Percent_Button">%</button>
					<button class = "Operation_Button" id = "Divide_Button">/</button>
				</div>
				<div class = "Row_Container">
					<button class = "Number_Button" id = "Back_Button">7</button>
					<button class = "Number_Button" id = "Clear_Button">8</button>
					<button class = "Number_Button" id = "Percent_Button">9</button>
					<button class = "Operation_Button" id = "Divide_Button">X</button>
				</div>
				<div class = "Row_Container">
					<button class = "Number_Button" id = "Back_Button">4</button>
					<button class = "Number_Button" id = "Clear_Button">5</button>
					<button class = "Number_Button" id = "Percent_Button">6</button>
					<button class = "Operation_Button" id = "Divide_Button">-</button>
				</div>
				<div class = "Row_Container">
					<button class = "Number_Button" id = "Back_Button">1</button>
					<button class = "Number_Button" id = "Clear_Button">2</button>
					<button class = "Number_Button" id = "Percent_Button">3</button>
					<button class = "Operation_Button" id = "Divide_Button">+</button>
				</div>
				<div class = "Row_Container">
					<button class = "Number_Button" id = "Back_Button">+/-</button>
					<button class = "Number_Button" id = "Clear_Button">0</button>
					<button class = "Number_Button" id = "Percent_Button">.</button>
					<button class = "Operation_Button" id = "Divide_Button">=</button>
				</div>
			</div>
		</div>
	</body>
</html>
