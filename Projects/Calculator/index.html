<!DOCTYPE html>
<html lang = "en">
	<head>
		<meta charset = "UTF-8">
		<title>Calculator</title>
		<link rel = "stylesheet" href = "styles.css">
		<script src = "script.js" defer></script>
	</head>
	<body>
		<div class = "Calculator_Container">
			<div class = "Display_Container">
				<!-- DEFAULT TEXT, good for testing -->
				ERROR
			</div>
			<div class = "Button_Container">
				<div class = "Row_Container">
					<button class = "Utility_Button Calc_Button" id = "Back_Button">Back</button>
					<button class = "Utility_Button Calc_Button" id = "Clear_Button">Clear</button>
					<button class = "Utility_Button Calc_Button" id = "Percent_Button">%</button>
					<button class = "Operation_Button Calc_Button" id = "Divide_Button">/</button>
				</div>
				<div class = "Row_Container">
					<button class = "Number_Button Calc_Button" id = "Seven_Button">7</button>
					<button class = "Number_Button Calc_Button" id = "Eight_Button">8</button>
					<button class = "Number_Button Calc_Button" id = "Nine_Button">9</button>
					<button class = "Operation_Button Calc_Button" id = "Multiply_Button">X</button>
				</div>
				<div class = "Row_Container">
					<button class = "Number_Button Calc_Button" id = "Four_Button">4</button>
					<button class = "Number_Button Calc_Button" id = "Five_Button">5</button>
					<button class = "Number_Button Calc_Button" id = "Six_Button">6</button>
					<button class = "Operation_Button Calc_Button" id = "Minus_Button">-</button>
				</div>
				<div class = "Row_Container">
					<button class = "Number_Button Calc_Button" id = "One_Button">1</button>
					<button class = "Number_Button Calc_Button" id = "Two_Button">2</button>
					<button class = "Number_Button Calc_Button" id = "Three_Button">3</button>
					<button class = "Operation_Button Calc_Button" id = "Add_Button">+</button>
				</div>
				<div class = "Row_Container">
					<button class = "Number_Button Calc_Button" id = "Sign_Button">+/-</button>
          <button class = "Number_Button Calc_Button" id = "Zero_Button">0</button>
					<button class = "Number_Button Calc_Button" id = "Decimal_Button">.</button>
					<button class = "Operation_Button Calc_Button" id = "Equal_Button">=</button>
				</div>
			</div>
		</div>
	</body>
</html>
