<!DOCTYPE html>
<html lang = "en">
    <head>
        <meta charset = "UTF-8">
        <title>Library</title>
        <link rel = "stylesheet" href = "styles.css">
        <script src = "script.js" defer></script>
    </head>

    <header>
        <button id = "AddBookButton">
            Add Book
        </button>
    </header>

    <body>
        <dialog id = "AddBookDialog">
            <form action = "#" method = "get">
                <div class = "formLine">
                    <label for = "FormTitle">Title</label>
                    <input type = "text" id = "FormTitle" name = "FormTitle" required>
                </div>
                <div class = "formLine">
                    <label for = "FormAuthor">Author</label>
                    <input type = "text" id = "FormAuthor" name = "FormAuthor" required>
                </div>
                <div class = "formLine">
                    <label for = "FormPages">Pages</label>
                    <input type = "text" id = "FormPages" name = "FormPages" required>
                </div>
                <div class = "formLine">
                    <label for = "FormRead">Read?</label>
                    <input type = "text" id = "FormRead" name = "FormRead" required>
                </div>
                <button type = "submit" id = "DialogButton">Close</button>
            </form>
        </dialog>

        <div id = "BookContainer">
        </div>
    </body>
</html>
